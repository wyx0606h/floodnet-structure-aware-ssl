experiment:
  name: segformer_b0_sup398_state_factorization
  run_id: segformer_b0_sup398_state_factorization_s20260702
  output_dir: outputs/segformer_b0_sup398_state_factorization
  seed: 20260702
  kind: supervised_baseline

dataset:
  protocol: sup398
  supervised_root: .
  challenge_root: .
  split_dir: splits
  train_list: splits/challenge_labeled_398.txt
  validation_list: splits/val_450.txt
  test_list: splits/test_448.txt
  unlabeled_list: splits/challenge_unlabeled_1047.txt

data:
  data_root: .
  manifest: splits/sup398_manifest.csv
  train_split: train
  validation_split: validation
  test_split: test
  crop_size: 512
  num_workers: 4
  drop_last: true
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  scale_range: [0.75, 1.25]
  class_aware_ids: [1, 3]
  class_aware_probability: 0.0
  center_crop_eval: false

model:
  name: segformer_b0
  num_labels: 10
  pretrained: true
  pretrained_model_name_or_path: nvidia/mit-b0
  local_files_only: false
  auxiliary_heads: [object, state]

loss:
  name: ce_dice
  ce_weight: 1.0
  dice_weight: 1.0

modules:
  state_factorization:
    enabled: true
    object_weight: 0.25
    state_weight: 0.25
    consistency_weight: 0.1

training:
  max_iterations: 40000
  val_interval: 2000
  batch_size: 2
  gradient_accumulation_steps: 4
  optimizer: adamw
  learning_rate: 0.00006
  weight_decay: 0.01
  scheduler: poly
  warmup_iterations: 1000
  poly_power: 1.0
  gradient_clip_norm: 1.0
  use_amp: true
  device: cuda

evaluation:
  tile_size: 512
  stride: 384
  tile_batch_size: 4
  boundary_tolerance: 3
